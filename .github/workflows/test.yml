name: Node.js CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: myporto_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=3

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: ./backend

    - name: Run tests
      run: npx jest --runInBand --detectOpenHandles --forceExit --coverage --passWithNoTests
      env:
        NODE_ENV: test
        JWT_SECRET: testsecret
        DB_HOST: 127.0.0.1
        DB_USER: root
        DB_PASSWORD: ""
        DB_NAME: myporto_db
        DB_DIALECT: mysql
        DB_PORT: 3306
      working-directory: ./backend