name: Node.js CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: ./backend

    - name: Run tests
      run: npx jest --runInBand --detectOpenHandles --forceExit --coverage --passWithNoTests || true
      env:
        NODE_ENV: test
        JWT_SECRET: testsecret
        DB_DIALECT: sqlite
        DB_STORAGE: ":memory:"
      working-directory: ./backend